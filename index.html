<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afella 2 Generator</title>
  <meta name="description" content="Randomly generate a stacked transparent character image from layer folders.">
  <link rel="icon" type="image/png" href="anime%20eyes.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260319a">
</head>
<body>
  <canvas id="particleField" class="particle-field" aria-hidden="true"></canvas>
  <button
    id="sidebarOpenBtn"
    class="sidebar-open-btn"
    type="button"
    aria-label="Open sidebar"
    title="Open controls"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 10v6"/>
      <path d="M12 7.2h.01"/>
    </svg>
  </button>

  <main class="app">
    <aside id="sidebar" class="sidebar">
      <button
        id="sidebarCloseBtn"
        class="sidebar-close-btn"
        type="button"
        aria-label="Close sidebar"
        title="Close controls"
      >
        <span aria-hidden="true">x</span>
      </button>
      <h1 class="sidebar-title">
        <button
          id="sidebarMintBtn"
          class="sidebar-title-icon-btn"
          type="button"
          aria-label="Open mint menu"
          title="Open mint menu"
        >
          <img src="anime%20eyes.png" alt="" aria-hidden="true" class="sidebar-title-icon">
        </button>
        <span class="sidebar-title-text">afella 2 generator</span>
        <button
          id="sidebarSettingsBtn"
          class="sidebar-title-action"
          type="button"
          aria-label="Open settings"
          title="Open settings"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Z"/>
            <path d="m3 13.4 1.8.4a7.4 7.4 0 0 0 .7 1.7l-1 1.6 2.2 2.2 1.6-1a7.4 7.4 0 0 0 1.7.7l.4 1.8h3.2l.4-1.8a7.4 7.4 0 0 0 1.7-.7l1.6 1 2.2-2.2-1-1.6a7.4 7.4 0 0 0 .7-1.7l1.8-.4v-3.2l-1.8-.4a7.4 7.4 0 0 0-.7-1.7l1-1.6-2.2-2.2-1.6 1a7.4 7.4 0 0 0-1.7-.7L13.4 3h-3.2l-.4 1.8a7.4 7.4 0 0 0-1.7.7l-1.6-1-2.2 2.2 1 1.6a7.4 7.4 0 0 0-.7 1.7L3 10.2Z"/>
          </svg>
        </button>
        <button
          id="sidebarModeBtn"
          class="sidebar-title-action"
          type="button"
          aria-label="Open saved gallery"
          title="Open saved gallery"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3Z"/>
          </svg>
        </button>
        <button
          id="sidebarShareBtn"
          class="sidebar-title-action"
          type="button"
          aria-label="Open share menu"
          title="Open share menu"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 11h4.4M13.6 11H18a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1Z"/>
            <path d="M12 14V4.6"/>
            <path d="m8.8 8.2 3.2-3.2 3.2 3.2"/>
          </svg>
        </button>
      </h1>

      <div id="layersView" class="sidebar-view sidebar-view-layers">
        <div id="layerControls" class="layer-controls" aria-label="Layer selectors"></div>

        <div class="actions">
          <button id="randomizeBtn" class="randomize-btn" type="button" disabled>
            <span class="btn-label">Randomize Layers</span>
            <span class="btn-loader" aria-hidden="true">
              <span class="loader-dot"></span>
              <span class="loader-dot"></span>
              <span class="loader-dot"></span>
              <span class="loader-dot"></span>
              <span class="loader-dot"></span>
              <span class="loader-dot"></span>
            </span>
          </button>
        </div>

        <div class="status-row">
          <button
            id="statusRefreshBtn"
            class="status-refresh-btn"
            type="button"
            aria-label="Restore previous stack"
            title="Restore previous stack"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 4v5h5"/>
              <path d="M3.5 12a8.5 8.5 0 1 0 2.5-6"/>
            </svg>
          </button>
          <p id="status" class="status">Loading layers...</p>
          <button
            id="favoriteBtn"
            class="favorite-btn"
            type="button"
            aria-label="Save current favorite"
            title="Save current favorite"
            aria-pressed="false"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.8l2.55 5.18 5.72.83-4.14 4.04.98 5.7L12 16.87 6.89 19.56l.98-5.7-4.14-4.04 5.72-.83Z"/>
            </svg>
          </button>
          <button
            id="downloadBtn"
            class="download-btn"
            type="button"
            aria-label="Download current composite as PNG"
            title="Download PNG"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4v10m0 0 4-4m-4 4-4-4M5 18h14"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="galleryView" class="sidebar-view sidebar-view-gallery" hidden>
        <p id="favoritesCount" class="gallery-count" aria-live="polite">total favorites: 0</p>
        <div id="galleryGrid" class="gallery-grid" aria-label="Saved generations"></div>
      </div>

      <div id="settingsView" class="sidebar-view sidebar-view-settings" hidden>
        <div class="settings-controls">
          <label class="settings-option">
            <input id="downloadMetadataCheckbox" class="settings-toggle-input" type="checkbox">
            <span class="settings-toggle-track" aria-hidden="true">
              <span class="settings-toggle-thumb"></span>
            </span>
            <span class="settings-toggle-text">download metadata</span>
          </label>
          <label class="settings-option">
            <input
              id="allowRandomizeHideCheckbox"
              class="settings-toggle-input"
              type="checkbox"
              checked
            >
            <span class="settings-toggle-track" aria-hidden="true">
              <span class="settings-toggle-thumb"></span>
            </span>
            <span class="settings-toggle-text">allow randomize to hide categories</span>
          </label>
          <label class="settings-option">
            <input
              id="enableEffectsCheckbox"
              class="settings-toggle-input"
              type="checkbox"
              checked
            >
            <span class="settings-toggle-track" aria-hidden="true">
              <span class="settings-toggle-thumb"></span>
            </span>
            <span class="settings-toggle-text">enable effects</span>
          </label>
          <label class="settings-option settings-option-magnifier">
            <input
              id="enableMagnifierCheckbox"
              class="settings-toggle-input"
              type="checkbox"
            >
            <span class="settings-toggle-track" aria-hidden="true">
              <span class="settings-toggle-thumb"></span>
            </span>
            <span class="settings-toggle-text">
              enable magnifier
              <span class="settings-toggle-note">(doesn't work on touch devices)</span>
            </span>
          </label>
          <div class="settings-download-row">
            <button id="downloadFavoritesBtn" class="settings-download-favorites" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v10m0 0 4-4m-4 4-4-4M5 18h14"/>
              </svg>
              <span>download all favorites</span>
            </button>
          </div>
          <button id="clearFavoritesBtn" class="settings-clear-favorites" type="button">
            clear all favorites
          </button>
        </div>
      </div>

      <div id="shareView" class="sidebar-view sidebar-view-share" hidden>
        <div class="share-controls">
          <button id="generateShareLinkBtn" class="share-generate-btn" type="button">
            generate sharable link
          </button>
          <div class="share-link-row">
            <input
              id="shareLinkValue"
              class="share-link-value"
              type="text"
              readonly
              spellcheck="false"
              aria-label="Generated sharable link"
              hidden
            >
            <button
              id="shareLinkCopyBtn"
              class="share-link-copy-btn"
              type="button"
              aria-label="Copy sharable link"
              title="Copy sharable link"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="11" height="11" rx="2"/>
                <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="mintView" class="sidebar-view sidebar-view-mint" hidden>
        <div class="mint-controls">
          <p class="mint-header-title">peer study 3: afella 2 official</p>
          <p class="mint-header-subtitle">
            created by
            <a
              href="https://x.com/urmeinong"
              class="mint-author-link"
              target="_blank"
              rel="noopener noreferrer"
            >
              @urmeinong
            </a>
          </p>
          <div class="mint-logos">
            <a
              href="https://www.vvv.so/peer-study-3-afella-2"
              class="mint-logo-item mint-link-item mint-link-vvv"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img src="vvv.svg" alt="VVV logo" class="mint-logo mint-logo-vvv">
              <p class="mint-logo-label">( mint now! )</p>
            </a>
            <a
              href="https://www.tensor.trade/trade/afella_2"
              class="mint-logo-item mint-link-item"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img src="tensor.png" alt="Tensor logo" class="mint-logo mint-logo-tensor">
              <p class="mint-logo-label">( secondary )</p>
            </a>
          </div>
        </div>
      </div>
    </aside>

    <div class="preview-wrap">
      <div id="canvas" class="canvas" aria-live="polite" aria-label="Generated character image"></div>
    </div>
  </main>

  <div
    id="clearFavoritesConfirmModal"
    class="confirm-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="clearFavoritesConfirmText"
    aria-hidden="true"
    hidden
  >
    <div class="confirm-modal-panel">
      <p id="clearFavoritesConfirmText" class="confirm-modal-text">
        are you sure? this cannot be reversed.
      </p>
      <div class="confirm-modal-actions">
        <button
          id="clearFavoritesConfirmYesBtn"
          class="confirm-modal-btn is-confirm"
          type="button"
          aria-label="Confirm clearing favorites"
          title="Confirm"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m5 12 4.2 4.2L19 6.8"/>
          </svg>
        </button>
        <button
          id="clearFavoritesConfirmNoBtn"
          class="confirm-modal-btn is-cancel"
          type="button"
          aria-label="Cancel clearing favorites"
          title="Cancel"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 6 12 12M18 6 6 18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="script.js?v=20260319a"></script>
</body>
</html>
