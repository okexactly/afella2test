<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afella 2 Generator</title>
  <meta name="description" content="Randomly generate a stacked transparent character image from layer folders.">
  <link rel="icon" type="image/png" href="anime%20eyes.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="particleField" class="particle-field" aria-hidden="true"></canvas>
  <button
    id="sidebarOpenBtn"
    class="sidebar-open-btn"
    type="button"
    aria-label="Open sidebar"
    title="Open controls"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 10v6"/>
      <path d="M12 7.2h.01"/>
    </svg>
  </button>

  <main class="app">
    <aside id="sidebar" class="sidebar">
      <button
        id="sidebarCloseBtn"
        class="sidebar-close-btn"
        type="button"
        aria-label="Close sidebar"
        title="Close controls"
      >
        <span aria-hidden="true">x</span>
      </button>
      <h1 class="sidebar-title">
        <img src="anime%20eyes.png" alt="" aria-hidden="true" class="sidebar-title-icon">
        <span class="sidebar-title-text">afella 2 generator</span>
      </h1>
      <div id="layerControls" class="layer-controls" aria-label="Layer selectors"></div>

      <div class="actions">
        <button id="randomizeBtn" class="randomize-btn" type="button" disabled>
          <span class="btn-label">Randomize Layers</span>
          <span class="btn-loader" aria-hidden="true">
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
          </span>
        </button>
        <button
          id="downloadBtn"
          class="download-btn"
          type="button"
          aria-label="Download current composite as PNG"
          title="Download PNG"
          disabled
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4v10m0 0 4-4m-4 4-4-4M5 18h14"/>
          </svg>
        </button>
      </div>

      <div class="status-row">
        <button
          id="statusRefreshBtn"
          class="status-refresh-btn"
          type="button"
          aria-label="Restore previous stack"
          title="Restore previous stack"
          disabled
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 4v5h5"/>
            <path d="M3.5 12a8.5 8.5 0 1 0 2.5-6"/>
          </svg>
        </button>
        <p id="status" class="status">Loading layers...</p>
      </div>
    </aside>

    <div class="preview-wrap">
      <div id="canvas" class="canvas" aria-live="polite" aria-label="Generated character image"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
